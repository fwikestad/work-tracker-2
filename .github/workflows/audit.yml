name: Security Audit

on:
  schedule:
    # Weekly on Mondays at 09:00 UTC
    - cron: '0 9 * * 1'
  pull_request:
    branches: [main]

jobs:
  audit:
    name: Security Audit
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Rust stable
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: stable
      
      - name: Setup Node.js 22.x
        uses: actions/setup-node@v4
        with:
          node-version: '22.x'
      
      - name: Install cargo-audit
        run: cargo install cargo-audit
      
      - name: Install npm dependencies
        run: npm ci
      
      - name: Run cargo audit
        id: cargo_audit
        run: cd src-tauri && cargo audit
        continue-on-error: false
      
      - name: Run npm audit
        id: npm_audit
        run: npm audit --audit-level=high
        continue-on-error: false
      
      - name: Create issue on scheduled audit failure
        if: failure() && github.event_name == 'schedule'
        uses: actions/github-script@v7
        with:
          script: |
            const title = '🚨 Security Audit Failed - ' + new Date().toISOString().split('T')[0];
            const body = `## Security Vulnerabilities Detected
            
            The weekly security audit has detected vulnerabilities in dependencies.
            
            **Workflow Run:** ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
            
            ### Actions Required
            
            1. Review the audit results in the workflow run
            2. Update vulnerable dependencies
            3. Run \`cargo audit\` and \`npm audit\` locally to verify fixes
            4. Create PRs to address vulnerabilities
            
            ### Commands to Run Locally
            
            \`\`\`bash
            # Rust dependencies
            cd src-tauri
            cargo audit
            cargo update
            
            # Node.js dependencies
            npm audit
            npm audit fix
            \`\`\`
            
            **Auto-generated by:** Security Audit workflow
            `;
            
            // Check if an issue with this title already exists
            const issues = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              labels: 'security'
            });
            
            const existingIssue = issues.data.find(issue => issue.title.startsWith('🚨 Security Audit Failed'));
            
            if (!existingIssue) {
              await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title: title,
                body: body,
                labels: ['security', 'dependencies']
              });
            }
